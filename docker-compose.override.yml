services:
  api:
    volumes:
      - ./api:/app   # Bind mount
      - api_node_modules:/app/node_modules

  client:
    volumes:
      - ./client:/app   # Bind mount
      - client_node_modules:/app/node_modules
    stdin_open: true
    tty: true


volumes:
  api_node_modules:
  client_node_modules: