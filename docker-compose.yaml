services:
  api:
    build: ./api
    container_name: docker-demo-api-c1
    ports:
      - '4000:4000'
    volumes:
      - ./api:/app
      - api_node_modules:/app/node_modules
    depends_on:
      - mongo
  
  client:
    build: ./client
    container_name: docker-demo-client-c1
    ports:
      - '5173:5173'
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
    stdin_open: true
    tty: true

  mongo:
    image: mongo
    container_name: docker-demo-mongo-c1
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db


volumes:
  api_node_modules:
  client_node_modules:
  mongo-data: